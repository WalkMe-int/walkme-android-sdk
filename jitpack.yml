install:
  # install public first
  - mvn install:install-file -Dfile=wmPublic-release.aar -DgroupId=com.github.WalkMe-int -DartifactId=walkme-android-sdk-api -Dversion=0.1.7-beta2 -Dpackaging=aar -DgeneratePom=false -DpomFile=pom-public.xml

  # install common second
  - mvn install:install-file -Dfile=wmCommonSdk-release.aar -DgroupId=com.github.WalkMe-int -DartifactId=walkme-android-sdk-common -Dversion=0.1.7-beta2 -Dpackaging=aar -DgeneratePom=false -DpomFile=pom-common.xml

  # then sdk (depends on common)
  - mvn install:install-file -Dfile=walkMeSDK-release.aar -DgroupId=com.github.WalkMe-int -DartifactId=walkme-android-sdk -Dversion=0.1.7-beta2 -Dpackaging=aar -DgeneratePom=false -DpomFile=pom-sdk.xml